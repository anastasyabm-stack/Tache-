<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tache</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f13;--card:#1a1a22;--border:#2a2a38;--text:#f0eff8;--muted:#8f8ba4;--accent:#7c5cfc;--accent2:#fc5c7d;--green:#5cfca0;--yellow:#fcd45c;--orange:#fc8c5c}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{min-height:100vh;max-width:440px;margin:0 auto;padding:24px 20px 40px;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}
    .screen{display:none;animation:fadeIn .25s ease}.screen.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .header{display:flex;align-items:center;gap:10px;margin-bottom:32px}.logo,.big-label,.method-title,.btn-primary,.timer-display,.timer-btn{font-family:"Syne",sans-serif}
    .logo{font-weight:800;font-size:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.big-label{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:20px}.big-label span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    textarea{width:100%;min-height:110px;resize:none;border:1.5px solid var(--border);border-radius:16px;outline:none;background:var(--card);color:var(--text);font:17px "DM Sans",sans-serif;padding:18px;transition:border-color .2s}textarea:focus{border-color:var(--accent)}textarea::placeholder{color:var(--muted)}
    .feeling-label{margin:28px 0 14px;color:var(--muted);font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}.feelings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .feel-btn,.method-btn,.btn-secondary,.timer-reset,.back-link{cursor:pointer}.feel-btn{position:relative;overflow:hidden;border:1.5px solid var(--border);border-radius:14px;background:var(--card);padding:14px 12px;text-align:left;transition:all .18s}.feel-btn .emoji{display:block;margin-bottom:6px;font-size:22px}.feel-name{display:block;color:var(--text);font-family:"Syne",sans-serif;font-size:13px;font-weight:700}.feel-sub{display:block;margin-top:2px;color:var(--muted);font-size:11px}.feel-btn.selected{border-color:var(--accent);background:rgba(124,92,252,.12)}.feel-btn.selected:after{content:"✓";position:absolute;top:8px;right:10px;color:var(--accent);font-size:13px;font-weight:700}
    .btn-primary{width:100%;border:0;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:17px;font-weight:700;padding:18px;transition:opacity .2s,transform .1s}.btn-primary:active{transform:scale(.98);opacity:.9}.btn-primary:disabled{cursor:not-allowed;opacity:.35}.btn-secondary{width:100%;margin-top:10px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);color:var(--text);font:500 15px "DM Sans",sans-serif;padding:14px}
    .methods{display:flex;flex-direction:column;gap:10px;margin:20px 0 24px}.method-btn{display:flex;align-items:center;gap:14px;width:100%;border:1.5px solid var(--border);border-radius:14px;background:var(--card);padding:16px;text-align:left}.method-icon{display:flex;flex:0 0 44px;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;font-size:22px}.method-title{color:var(--text);font-size:15px;font-weight:700}.method-desc{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.4}
    .response-card{margin:20px 0;border:1.5px solid var(--border);border-radius:18px;background:var(--card);padding:22px;font-size:16px;line-height:1.7;white-space:pre-wrap}.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;margin:16px 0;border:1.5px solid var(--border);border-radius:18px;background:var(--card);padding:24px}.timer-display{color:var(--text);font-size:52px;font-weight:800;letter-spacing:2px}.timer-row{display:flex;gap:10px}.timer-btn{border:0;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:15px;font-weight:700;padding:12px 28px}.timer-reset{border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--muted);font-size:15px;padding:12px 18px}svg.ring{transform:rotate(-90deg)}.ring-bg{fill:none;stroke:var(--border);stroke-width:5}.ring-fill{fill:none;stroke:url(#grad);stroke-linecap:round;stroke-width:5;transition:stroke-dashoffset 1s linear}
    .loading{display:flex;align-items:center;gap:10px;padding:20px 0;color:var(--muted);font-size:15px}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}.dot:nth-child(2){animation-delay:.2s;background:var(--accent2)}.dot:nth-child(3){animation-delay:.4s;background:var(--yellow)}@keyframes bounce{0%,80%,100%{opacity:.4;transform:scale(.6)}40%{opacity:1;transform:scale(1)}}
    .task-recap{margin-bottom:20px;border:1px solid rgba(124,92,252,.2);border-radius:12px;background:rgba(124,92,252,.08);color:var(--muted);font-size:14px;padding:14px 16px}.task-recap strong{display:block;margin-bottom:4px;color:var(--text);font-size:15px}.done-msg{padding:16px 0;text-align:center;font-size:28px}.back-link{display:flex;align-items:center;gap:6px;margin-bottom:24px;border:0;background:none;color:var(--muted);font-size:14px}
  </style>
</head>
<body>
  <main>
    <section class="screen active" id="screen-task">
      <div class="header"><span>⚡</span><span class="logo">Tache</span></div>
      <div class="big-label">C'est quoi ta <span>tâche</span> ?</div>
      <textarea id="task-input" placeholder="Ex : envoyer un email, ranger ma chambre, réviser..." rows="4"></textarea>
      <div class="feeling-label">Comment tu te sens là ?</div>
      <div class="feelings">
        <button class="feel-btn" data-feel="rapide"><span class="emoji">⚡</span><span class="feel-name">Démarrer vite</span><span class="feel-sub">Règle 2 min · Timer-course</span></button>
        <button class="feel-btn" data-feel="bloquee"><span class="emoji">🧱</span><span class="feel-name">Je suis bloquée</span><span class="feel-sub">Reverse Pomodoro · Micro-étape</span></button>
        <button class="feel-btn" data-feel="motivation"><span class="emoji">🎮</span><span class="feel-name">Besoin motivation</span><span class="feel-sub">Mini-quête · Task racing</span></button>
        <button class="feel-btn" data-feel="submergee"><span class="emoji">😰</span><span class="feel-name">Je suis submergée</span><span class="feel-sub">1 seule chose · Brain dump</span></button>
        <button class="feel-btn" data-feel="temps" style="grid-column:span 2"><span class="emoji">⏱️</span><span class="feel-name">Combien de temps ?</span><span class="feel-sub">Estimation x1.5 · Découpage visible</span></button>
      </div>
      <button class="btn-primary" id="btn-next" disabled>Voir mes options →</button>
    </section>
    <section class="screen" id="screen-methods">
      <button class="back-link" data-screen="screen-task">← Retour</button>
      <div class="task-recap"><strong id="recap-task"></strong><span id="recap-feels"></span></div>
      <div class="big-label">Quelle <span>méthode</span> ?</div>
      <div class="methods" id="methods-list"></div>
    </section>
    <section class="screen" id="screen-response">
      <button class="back-link" data-reset-task>← Nouvelle tâche</button>
      <div class="task-recap"><strong id="resp-task"></strong></div>
      <div id="loading-wrap" class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Préparation de ton plan...</span></div>
      <div id="response-content" style="display:none">
        <div class="response-card" id="response-text"></div>
        <div id="timer-section" style="display:none"><div class="timer-wrap"><svg width="100" height="100" viewBox="0 0 100 100" class="ring" aria-hidden="true"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#7c5cfc"/><stop offset="100%" style="stop-color:#fc5c7d"/></linearGradient></defs><circle class="ring-bg" cx="50" cy="50" r="44"/><circle class="ring-fill" id="ring" cx="50" cy="50" r="44" stroke-dasharray="276.46" stroke-dashoffset="0"/></svg><div class="timer-display" id="timer-display">5:00</div><div class="timer-row"><button class="timer-btn" id="timer-btn">▶ Start</button><button class="timer-reset" id="timer-reset">↺</button></div><div id="timer-done" style="display:none" class="done-msg">🎉 +1 point !</div></div></div>
        <button class="btn-primary" data-reset-task>Nouvelle tâche ⚡</button><button class="btn-secondary" id="reset-all">Tout recommencer</button>
      </div>
    </section>
  </main>
  <script>
    const TOTAL_SECONDS=300,CIRCUMFERENCE=276.46;let timerRemaining=TOTAL_SECONDS,timerRunning=false,timerInterval=null,selectedFeels=[],currentTask="";
    const methodsByFeeling={rapide:[{id:"regle2",icon:"🎯",color:"#5cfca0",title:"Règle des 2 min",desc:"Une action si petite que c'est impossible de refuser"},{id:"timer_course",icon:"🏁",color:"#fcd45c",title:"Timer-course",desc:"Combien tu peux faire en 5 min chrono ?"}],bloquee:[{id:"reverse_pomodoro",icon:"🍅",color:"#fc8c5c",title:"Reverse Pomodoro",desc:"Juste 5 min. Pas besoin de finir."},{id:"micro_etape",icon:"•",color:"#7c5cfc",title:"Micro-étape ridicule",desc:"Action minuscule pour remettre le mouvement"}],motivation:[{id:"mini_quete",icon:"⚔️",color:"#fc5c7d",title:"Mini-quête RPG",desc:"Points, niveau, récompense : ton cerveau adore ça"},{id:"task_racing",icon:"🏎️",color:"#fcd45c",title:"Task Racing",desc:"Timer compétitif contre toi-même"}],submergee:[{id:"une_chose",icon:"🎯",color:"#5cfca0",title:"1 seule chose",desc:"Tout le reste à la poubelle. Maintenant."},{id:"brain_dump",icon:"🧠",color:"#7c5cfc",title:"Brain Dump Express",desc:"Vide ta tête en 60 secondes puis on trie"}],temps:[{id:"estimation",icon:"⏱️",color:"#fc8c5c",title:"Estimation x1.5",desc:"Le temps réel avec les sous-tâches cachées"},{id:"decoupage",icon:"📊",color:"#5cfca0",title:"Découpage visible",desc:"Progression numérotée : 1/7, 2/7..."}]};
    const feelingLabels={rapide:"⚡ Démarrer vite",bloquee:"🧱 Bloquée",motivation:"🎮 Motivation",submergee:"😰 Submergée",temps:"⏱️ Temps"};
    const responses={regle2:()=>"⚡ Ouvre juste le document ou l'application nécessaire.\nC'est tout. Pas besoin d'aller plus loin maintenant.",timer_course:()=>`🏁 Top chrono.\nPendant 5 minutes, avance le plus possible sur :\n"${currentTask}"\nPas besoin de finir.`,reverse_pomodoro:()=>"🍅 Tu fais juste 5 minutes.\nAprès, tu as totalement le droit d'arrêter.\nCommence uniquement par la première mini-action.",micro_etape:()=>`Micro-étape ridicule :\nPrends juste ce qu'il faut pour commencer "${currentTask}".\nRien d'autre.`,mini_quete:()=>`⚔️ QUÊTE ACTIVÉE\nMission : ${currentTask}\n🎯 Niveau 1 : commencer\n⚡ Niveau 2 : 5 minutes focus\n🏆 Récompense : pause dopamine autorisée`,task_racing:()=>`🏎️ Challenge lancé.\nCombien peux-tu avancer sur "${currentTask}" en 5 minutes ?\nGo.`,une_chose:()=>`🎯 Une seule chose compte maintenant :\n${currentTask}\nIgnore absolument le reste.`,brain_dump:()=>"🧠 Vide tout ce qui tourne dans ta tête.\nPuis classe :\n• Maintenant\n• Plus tard\n• Poubelle",estimation:()=>"⏱️ Estimation réaliste :\nAjoute le temps d'installation, les interruptions et les mini-pauses.\nPuis multiplie par 1.5.",decoupage:()=>"📊 Découpage :\n1/5 Ouvrir ce qu'il faut\n2/5 Faire la première action\n3/5 Avancer un peu\n4/5 Finir le minimum utile\n5/5 Vérifier rapidement"};
    const timerMethods=new Set(["timer_course","mini_quete","task_racing","reverse_pomodoro"]);
    function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));const screen=document.getElementById(id);if(screen){screen.classList.add("active");window.scrollTo(0,0)}}
    function updateNextButton(){const task=document.getElementById("task-input").value.trim();document.getElementById("btn-next").disabled=task.length<=2||selectedFeels.length===0}
    function toggleFeeling(button){button.classList.toggle("selected");selectedFeels=[...document.querySelectorAll(".feel-btn.selected")].map(item=>item.dataset.feel);updateNextButton()}
    function goToMethods(){currentTask=document.getElementById("task-input").value.trim();document.getElementById("recap-task").textContent=currentTask;document.getElementById("recap-feels").textContent=selectedFeels.map(feel=>feelingLabels[feel]).join(" · ");const list=document.getElementById("methods-list");list.innerHTML="";selectedFeels.forEach(feel=>{methodsByFeeling[feel].forEach(method=>{const button=document.createElement("button");button.className="method-btn";button.innerHTML=`<div class="method-icon" style="background:${method.color}22">${method.icon}</div><div><div class="method-title">${method.title}</div><div class="method-desc">${method.desc}</div></div>`;button.addEventListener("click",()=>chooseMethod(method.id));list.appendChild(button)})});showScreen("screen-methods")}
    function chooseMethod(methodId){document.getElementById("resp-task").textContent=currentTask;document.getElementById("loading-wrap").style.display="flex";document.getElementById("response-content").style.display="none";showScreen("screen-response");resetTimer();window.setTimeout(()=>{document.getElementById("response-text").textContent=responses[methodId]?.()||"Commence par une toute petite action.";document.getElementById("loading-wrap").style.display="none";document.getElementById("response-content").style.display="block";document.getElementById("timer-section").style.display=timerMethods.has(methodId)?"block":"none"},350)}
    function toggleTimer(){if(timerRemaining===0)return;timerRunning=!timerRunning;const button=document.getElementById("timer-btn");if(timerRunning){button.textContent="⏸ Pause";timerInterval=window.setInterval(tickTimer,1000)}else{button.textContent="▶ Continuer";window.clearInterval(timerInterval)}}
    function tickTimer(){timerRemaining-=1;const minutes=Math.floor(timerRemaining/60),seconds=timerRemaining%60;document.getElementById("timer-display").textContent=`${minutes}:${String(seconds).padStart(2,"0")}`;document.getElementById("ring").style.strokeDashoffset=CIRCUMFERENCE*(1-timerRemaining/TOTAL_SECONDS);if(timerRemaining<=0){window.clearInterval(timerInterval);timerRunning=false;document.getElementById("timer-btn").style.display="none";document.getElementById("timer-done").style.display="block"}}
    function resetTimer(){window.clearInterval(timerInterval);timerRunning=false;timerRemaining=TOTAL_SECONDS;document.getElementById("timer-display").textContent="5:00";document.getElementById("ring").style.strokeDashoffset=0;document.getElementById("timer-btn").textContent="▶ Start";document.getElementById("timer-btn").style.display="inline-block";document.getElementById("timer-done").style.display="none"}
    function resetAll(){selectedFeels=[];document.querySelectorAll(".feel-btn").forEach(button=>button.classList.remove("selected"));document.getElementById("task-input").value="";updateNextButton();showScreen("screen-task")}
    document.querySelectorAll(".feel-btn").forEach(button=>button.addEventListener("click",()=>toggleFeeling(button)));document.querySelectorAll("[data-screen]").forEach(button=>button.addEventListener("click",()=>showScreen(button.dataset.screen)));document.querySelectorAll("[data-reset-task]").forEach(button=>button.addEventListener("click",()=>showScreen("screen-task")));document.getElementById("task-input").addEventListener("input",updateNextButton);document.getElementById("btn-next").addEventListener("click",goToMethods);document.getElementById("timer-btn").addEventListener("click",toggleTimer);document.getElementById("timer-reset").addEventListener("click",resetTimer);document.getElementById("reset-all").addEventListener("click",resetAll);
  </script>
</body>
</html>
