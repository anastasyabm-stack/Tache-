<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tache</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--card:#1a1a22;--soft:#22222e;--border:#303041;--text:#f0eff8;--muted:#928ea8;--accent:#7c5cfc;--accent2:#fc5c7d;--green:#5cfca0;--yellow:#fcd45c;--orange:#fc8c5c}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;max-width:440px;margin:0 auto;padding:20px 18px 40px;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}.screen{display:none;animation:fade .25s ease}.screen.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}.logo,.title,.btn,.home-card,.method-title,.timer-display{font-family:"Syne",sans-serif}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:26px}.brand{display:flex;align-items:center;gap:10px}.logo{font-weight:800;font-size:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.title{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:18px}.title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav,.back{border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);padding:10px 12px;cursor:pointer}.back{display:inline-flex;margin-bottom:20px;background:none;color:var(--muted)}button{font:inherit}.home-grid{display:grid;gap:12px}.home-card{width:100%;border:1.5px solid var(--border);border-radius:16px;background:var(--card);color:var(--text);padding:22px;text-align:left;cursor:pointer}.home-card strong{display:block;font-size:20px;margin-bottom:6px}.home-card span{color:var(--muted);font-family:"DM Sans",sans-serif;font-size:14px;line-height:1.45}.home-card.main{border-color:rgba(124,92,252,.6);background:linear-gradient(135deg,rgba(124,92,252,.2),rgba(252,92,125,.12))}input,textarea{width:100%;border:1.5px solid var(--border);border-radius:16px;outline:none;background:var(--card);color:var(--text);font:16px "DM Sans",sans-serif;padding:16px}textarea{min-height:108px;resize:none}input:focus,textarea:focus{border-color:var(--accent)}label,.label{display:block;margin:18px 0 8px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}.btn{width:100%;border:0;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:17px;font-weight:700;padding:17px;cursor:pointer}.btn:disabled{opacity:.35}.btn.secondary{margin-top:10px;border:1.5px solid var(--border);background:var(--card)}.voice{display:grid;gap:8px;margin-top:12px}.voice button{border:1.5px solid var(--accent);border-radius:14px;background:rgba(124,92,252,.16);color:var(--text);font:700 15px "Syne",sans-serif;padding:15px;cursor:pointer}.voice button.listening{border-color:var(--accent2);background:rgba(252,92,125,.18)}.voice div{min-height:18px;color:var(--muted);font-size:12px;text-align:center}.feelings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}.feel{position:relative;border:1.5px solid var(--border);border-radius:14px;background:var(--card);padding:14px 12px;text-align:left;cursor:pointer}.feel .emoji{display:block;margin-bottom:6px;font-size:22px}.feel strong{display:block;font-family:"Syne",sans-serif;font-size:13px}.feel span{display:block;margin-top:2px;color:var(--muted);font-size:11px}.feel.selected{border-color:var(--accent);background:rgba(124,92,252,.12)}.feel.selected:after{content:"✓";position:absolute;top:8px;right:10px;color:var(--accent);font-weight:700}.methods{display:grid;gap:10px;margin:18px 0 24px}.method{display:flex;gap:14px;align-items:center;width:100%;border:1.5px solid var(--border);border-radius:14px;background:var(--card);color:var(--text);padding:16px;text-align:left;cursor:pointer}.icon{display:grid;place-items:center;width:44px;height:44px;flex:0 0 44px;border-radius:12px;font-size:22px}.method-title{font-size:15px;font-weight:700}.method-desc{margin-top:3px;color:var(--muted);font-size:12px}.panel,.response{margin:16px 0;border:1.5px solid var(--border);border-radius:18px;background:var(--card);padding:18px;font-size:16px;line-height:1.65;white-space:pre-wrap}.recap{margin-bottom:18px;border:1px solid rgba(124,92,252,.22);border-radius:12px;background:rgba(124,92,252,.08);color:var(--muted);padding:14px}.recap strong{display:block;color:var(--text);margin-bottom:4px}.loading{display:flex;gap:10px;align-items:center;padding:18px 0;color:var(--muted)}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:b 1.2s infinite}.dot:nth-child(2){animation-delay:.2s;background:var(--accent2)}.dot:nth-child(3){animation-delay:.4s;background:var(--yellow)}@keyframes b{0%,80%,100%{opacity:.4;transform:scale(.6)}40%{opacity:1;transform:scale(1)}}.timer{display:flex;flex-direction:column;align-items:center;gap:16px;margin:16px 0;border:1.5px solid var(--border);border-radius:18px;background:var(--card);padding:24px}.timer-display{font-size:52px;font-weight:800}.timer-row{display:flex;gap:10px}.timer button{border:0;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-weight:700;padding:12px 24px;cursor:pointer}.timer .reset{border:1.5px solid var(--border);background:var(--card);color:var(--muted);padding:12px 16px}.project-card{width:100%;border:1.5px solid var(--border);border-radius:16px;background:var(--card);color:var(--text);padding:16px;margin:10px 0;text-align:left;cursor:pointer}.project-card span{display:block;color:var(--muted);font-size:13px;margin-top:5px}.progress{display:flex;gap:18px;align-items:center;margin:16px 0}.circle{width:104px;height:104px;border-radius:50%;background:conic-gradient(var(--green) var(--p),var(--border) 0);display:grid;place-items:center;flex:0 0 104px}.circle div{width:78px;height:78px;border-radius:50%;background:var(--bg);display:grid;place-items:center;font:800 20px "Syne",sans-serif}.steps{display:grid;gap:10px;margin:14px 0}.step{display:grid;grid-template-columns:auto 1fr;gap:10px;border:1.5px solid var(--border);border-radius:14px;background:var(--soft);padding:12px}.step input{width:20px;height:20px;margin-top:3px}.step.done .step-text{text-decoration:line-through;color:var(--muted)}.pill{display:inline-block;margin-bottom:4px;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700;background:rgba(124,92,252,.18);color:#c8bcff}.files{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.file{border:1px solid var(--border);border-radius:999px;background:var(--soft);color:var(--muted);font-size:12px;padding:6px 9px}.empty{color:var(--muted);text-align:center;padding:30px 12px}.guide-actions{display:grid;gap:10px;margin-top:14px}.ok{color:var(--green);font-weight:700}
</style>
</head>
<body>
<main>
<section class="screen active" id="home"><div class="top"><div class="brand"><span>⚡</span><span class="logo">Tache</span></div><button class="nav" id="to-projects">Mes projets</button></div><div class="title">Tu veux faire quoi <span>maintenant</span> ?</div><div class="home-grid"><button class="home-card main" id="to-create"><strong>Créer un nouveau projet</strong><span>Questions guidées, micro-étapes, timers et progression.</span></button><button class="home-card" id="to-work"><strong>Je veux travailler</strong><span>Mode tâche rapide avec les méthodes existantes.</span></button></div></section>
<section class="screen" id="projects"><button class="back" data-screen="home">← Accueil</button><div class="title">Mes <span>projets</span></div><div id="project-list"></div><button class="btn" data-screen="create">Créer un nouveau projet</button></section>
<section class="screen" id="create"><button class="back" data-screen="home">← Accueil</button><div class="title">Nouveau <span>projet</span></div><label>Nom du projet</label><input id="p-name" placeholder="Ex : exposé, dossier, chambre..."><label>Ce que tu dois faire</label><textarea id="p-desc" placeholder="Décris en quelques phrases."></textarea><label>Quel est le but principal ?</label><textarea id="p-goal"></textarea><label>Quelles sont les étapes critiques ?</label><textarea id="p-critical" placeholder="Une étape par ligne si tu veux."></textarea><label>Quels obstacles envisages-tu ?</label><textarea id="p-obstacles"></textarea><label>Fichiers utiles</label><input id="p-files" type="file" multiple><label>Durée Pomodoro</label><input id="p-duration" type="number" min="5" max="60" value="25"><button class="btn" id="build-project">Créer le plan</button></section>
<section class="screen" id="project-detail"><button class="back" data-screen="home">← Accueil</button><div id="project-detail-box"></div></section>
<section class="screen" id="task"><div class="top"><button class="nav" data-screen="home">Accueil</button><button class="nav" id="to-projects-2">Mes projets</button></div><div class="brand"><span>⚡</span><span class="logo">Tache</span></div><div class="title">C'est quoi ta <span>tâche</span> ?</div><textarea id="task-input" placeholder="Ex : envoyer un email, ranger ma chambre, réviser..."></textarea><div class="voice"><button id="voice-btn">Dictée</button><div id="voice-status">Dictée française uniquement.</div></div><div class="label">Comment tu te sens là ?</div><div class="feelings"><button class="feel" data-feel="rapide"><span class="emoji">⚡</span><strong>Démarrer vite</strong><span>Règle 2 min · Timer-course</span></button><button class="feel" data-feel="bloquee"><span class="emoji">🧱</span><strong>Je suis bloquée</strong><span>Reverse Pomodoro · Micro-étape</span></button><button class="feel" data-feel="motivation"><span class="emoji">🎮</span><strong>Besoin motivation</strong><span>Mini-quête · Task racing</span></button><button class="feel" data-feel="submergee"><span class="emoji">😰</span><strong>Je suis submergée</strong><span>1 seule chose · Brain dump</span></button><button class="feel" data-feel="temps" style="grid-column:span 2"><span class="emoji">⏱️</span><strong>Combien de temps ?</strong><span>Estimation x1.5 · Découpage visible</span></button></div><button class="btn" id="btn-next" disabled>Voir mes options →</button></section>
<section class="screen" id="methods"><button class="back" data-screen="task">← Retour</button><div class="recap"><strong id="recap-task"></strong><span id="recap-feels"></span></div><div class="title">Quelle <span>méthode</span> ?</div><div class="methods" id="methods-list"></div></section>
<section class="screen" id="response"><button class="back" data-reset-task>← Nouvelle tâche</button><div class="recap"><strong id="resp-task"></strong></div><div id="loading" class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Préparation de ton plan...</span></div><div id="response-content" style="display:none"><div class="response" id="response-text"></div><div id="timer-section" style="display:none"><div class="timer"><div class="timer-display" id="timer-display">5:00</div><div class="timer-row"><button id="timer-btn">▶ Start</button><button class="reset" id="timer-reset">↺</button></div><div id="timer-done" style="display:none" class="ok">Pause terminée, tu peux continuer.</div></div></div><button class="btn" data-reset-task>Nouvelle tâche ⚡</button><button class="btn secondary" id="reset-all">Tout recommencer</button></div></section>
</main>
<script>
const $=id=>document.getElementById(id),STORE='tache_projects_v2';let selectedFeels=[],currentTask='',recognition=null,isListening=false,voiceBaseText='',activeProjectId=null,timerRemaining=300,timerRunning=false,timerInterval=null,timerGuideInterval=null,guideSteps=[],guideIndex=0,guideDone=false;
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');scrollTo(0,0);if(id==='projects')renderProjects()}document.querySelectorAll('[data-screen]').forEach(b=>b.onclick=()=>show(b.dataset.screen));$('to-projects').onclick=()=>show('projects');$('to-projects-2').onclick=()=>show('projects');$('to-create').onclick=()=>show('create');$('to-work').onclick=()=>show('task');document.querySelectorAll('[data-reset-task]').forEach(b=>b.onclick=()=>show('task'));
function projects(){return JSON.parse(localStorage.getItem(STORE)||'[]')}function saveProjects(list){localStorage.setItem(STORE,JSON.stringify(list))}function splitLines(t){return t.split(/\n|,|;/).map(x=>x.trim()).filter(Boolean)}function makeSteps(){const desc=$('p-desc').value.trim(),goal=$('p-goal').value.trim(),crit=splitLines($('p-critical').value),obs=splitLines($('p-obstacles').value),steps=[];steps.push({text:'Clarifier le résultat attendu : '+(goal||desc||'définir le projet'),done:false});crit.forEach(x=>steps.push({text:x,done:false}));steps.push({text:'Préparer le matériel, les fichiers et l’espace de travail',done:false});steps.push({text:'Faire une première version imparfaite mais complète',done:false});obs.forEach(x=>steps.push({text:'Prévoir une solution pour : '+x,done:false}));steps.push({text:'Vérifier le minimum utile et corriger ce qui bloque',done:false});steps.push({text:'Sauvegarder ou ranger le résultat final',done:false});return steps.slice(0,12)}$('build-project').onclick=()=>{const p={id:String(Date.now()),name:$('p-name').value.trim()||'Projet sans nom',desc:$('p-desc').value.trim(),goal:$('p-goal').value.trim(),files:[...$('p-files').files].map(f=>f.name),duration:Math.max(5,Math.min(60,Number($('p-duration').value)||25)),steps:makeSteps(),created:new Date().toISOString()};const list=projects();list.unshift(p);saveProjects(list);openProject(p.id)};
function renderProjects(){const list=projects(),box=$('project-list');box.innerHTML=list.length?'':'<div class="empty">Aucun projet sauvegardé pour l’instant.</div>';list.forEach(p=>{const done=p.steps.filter(s=>s.done).length;const b=document.createElement('button');b.className='project-card';b.innerHTML=`<strong>${p.name}</strong><span>${done}/${p.steps.length} étapes terminées · ${p.duration} min</span>`;b.onclick=()=>openProject(p.id);box.appendChild(b)})}function pct(p){return p.steps.length?Math.round(p.steps.filter(s=>s.done).length/p.steps.length*100):0}function openProject(id){activeProjectId=id;renderProject();show('project-detail')}function renderProject(){const p=projects().find(x=>x.id===activeProjectId);if(!p)return show('projects');const n=pct(p);$('project-detail-box').innerHTML=`<div class="title">${p.name}</div><div class="progress"><div class="circle" style="--p:${n}%"><div>${n}%</div></div><div>${p.desc||'Projet sauvegardé.'}<br><span style="color:var(--muted)">${p.duration} min par Pomodoro</span></div></div><div class="panel"><strong>But principal</strong><br>${p.goal||'À préciser.'}</div><div class="files">${p.files.map(f=>`<span class="file">${f}</span>`).join('')||'<span class="file">Aucun fichier ajouté</span>'}</div><div class="steps">${p.steps.map((s,i)=>`<label class="step ${s.done?'done':''}"><input type="checkbox" data-step="${i}" ${s.done?'checked':''}><span class="step-text"><span class="pill">Priorité</span><br>${s.text}</span></label>`).join('')}</div><div class="timer"><div class="timer-display" id="p-timer">${p.duration}:00</div><div class="timer-row"><button onclick="alert('Timer Pomodoro prêt : lance une session de '+${p.duration}+' min.')">▶ Start</button><button class="reset">↺</button></div></div><button class="btn secondary" id="delete-project">Supprimer</button>`;document.querySelectorAll('[data-step]').forEach(c=>c.onchange=e=>{const list=projects(),p=list.find(x=>x.id===activeProjectId);p.steps[Number(e.target.dataset.step)].done=e.target.checked;saveProjects(list);renderProject()});$('delete-project').onclick=()=>{saveProjects(projects().filter(p=>p.id!==activeProjectId));show('projects')}}
const methods={rapide:[['regle2','🎯','Règle des 2 min','Guidage étape par étape'],['timer_course','🏁','Timer-course','5 minutes avec consignes']],bloquee:[['reverse_pomodoro','🍅','Reverse Pomodoro','5 minutes sans pression'],['micro_etape','•','Micro-étape ridicule','Action minuscule']],motivation:[['mini_quete','⚔️','Mini-quête RPG','Niveaux courts'],['task_racing','🏎️','Task Racing','Défi de 5 minutes']],submergee:[['une_chose','🎯','1 seule chose','Ignore le reste'],['brain_dump','🧠','Brain Dump Express','Vide ta tête']],temps:[['estimation','⏱️','Estimation x1.5','Temps réaliste'],['decoupage','📊','Découpage visible','Étapes numérotées']]},feelLabel={rapide:'⚡ Démarrer vite',bloquee:'🧱 Bloquée',motivation:'🎮 Motivation',submergee:'😰 Submergée',temps:'⏱️ Temps'},timerModes=new Set(['timer_course','reverse_pomodoro','mini_quete','task_racing']);
function updateNext(){ $('btn-next').disabled=$('task-input').value.trim().length<3||!selectedFeels.length }document.querySelectorAll('.feel').forEach(b=>b.onclick=()=>{b.classList.toggle('selected');selectedFeels=[...document.querySelectorAll('.feel.selected')].map(x=>x.dataset.feel);updateNext()});$('task-input').oninput=updateNext;$('btn-next').onclick=()=>{currentTask=$('task-input').value.trim();$('recap-task').textContent=currentTask;$('recap-feels').textContent=selectedFeels.map(f=>feelLabel[f]).join(' · ');$('methods-list').innerHTML='';selectedFeels.flatMap(f=>methods[f]).forEach(m=>{const b=document.createElement('button');b.className='method';b.innerHTML=`<div class="icon" style="background:rgba(124,92,252,.16)">${m[1]}</div><div><div class="method-title">${m[2]}</div><div class="method-desc">${m[3]}</div></div>`;b.onclick=()=>choose(m[0]);$('methods-list').appendChild(b)});show('methods')};
function choose(id){$('resp-task').textContent=currentTask;$('loading').style.display='flex';$('response-content').style.display='none';show('response');setTimeout(()=>{if(id==='regle2')return startTwoMin();$('loading').style.display='none';$('response-content').style.display='block';if(timerModes.has(id))startTimerGuide(id);else{clearInterval(timerGuideInterval);$('timer-section').style.display='none';$('response-text').textContent=basicText(id)}},250)}function taskName(){return currentTask.replace(/[.!?]+$/,'').trim().toLowerCase()||'ta tâche'}function startTwoMin(){guideSteps=[`Fais ceci maintenant, ça prendra moins de deux minutes : ouvre ce qu’il faut pour ${taskName()}.`,`Fais ceci maintenant, ça prendra moins de deux minutes : prépare seulement le premier élément utile.`,`Fais ceci maintenant, ça prendra moins de deux minutes : fais la toute première action visible.`,`Fais ceci maintenant, ça prendra moins de deux minutes : note ce qu’il reste à faire.`];guideIndex=0;guideDone=false;$('loading').style.display='none';$('response-content').style.display='block';$('timer-section').style.display='none';renderGuide()}function renderGuide(){const done=guideIndex>=guideSteps.length;$('response-text').innerHTML=done?`<strong>Terminé.</strong><br>Bravo, tu as fait toutes les micro-étapes.`:`<strong>Étape ${guideIndex+1}/${guideSteps.length}</strong><br>${guideSteps[guideIndex]}<div class="guide-actions"><label class="step ${guideDone?'done':''}"><input id="guide-check" type="checkbox" ${guideDone?'checked':''}><span class="step-text">${guideDone?'Bravo, tu as fait l’étape.':'Coche quand c’est fait.'}</span></label><button class="btn" id="guide-next" ${guideDone?'':'disabled'}>${guideIndex===guideSteps.length-1?'Terminer':'Suivant'}</button></div>`;if(!done){$('guide-check').onchange=e=>{guideDone=e.target.checked;renderGuide()};$('guide-next').onclick=()=>{guideIndex++;guideDone=false;renderGuide()}}}
function startTimerGuide(id){timerRemaining=300;timerRunning=false;clearInterval(timerGuideInterval);$('timer-section').style.display='block';$('timer-btn').style.display='inline-block';$('timer-done').style.display='none';setTimerText();const msg={timer_course:['Top chrono : ouvre ce qu’il faut.','Continue : une seule action utile.','Pause rapide : respire, puis reprends.','Dernière ligne droite : termine le minimum visible.'],reverse_pomodoro:['Juste 5 minutes : première action.','Tu peux ralentir, il faut seulement rester avec la tâche.','Pause courte : respire.','Encore un petit bout, puis tu peux arrêter.'],task_racing:['Défi lancé : premier geste.','Garde le rythme : une action puis une autre.','Encouragement : tu avances déjà.','Dernier sprint : plus petit morceau possible.'],mini_quete:['Quête lancée : niveau 1.','Niveau 2 : 5 minutes focus.','Bonus courage : tu as démarré.','Boss final : termine une mini-partie.']}[id];let i=0;$('response-text').textContent=msg[0];timerGuideInterval=setInterval(()=>{i=Math.min(i+1,msg.length-1);$('response-text').textContent=msg[i]},75000)}function basicText(id){return{micro_etape:`Micro-étape ridicule :\nPrends juste ce qu'il faut pour commencer "${currentTask}".`,une_chose:`Une seule chose compte maintenant :\n${currentTask}`,brain_dump:'Vide tout ce qui tourne dans ta tête.\nPuis classe : Maintenant / Plus tard / Poubelle',estimation:'Ajoute le temps d’installation, les interruptions et les mini-pauses. Puis multiplie par 1.5.',decoupage:'1/5 Ouvrir\n2/5 Commencer\n3/5 Avancer\n4/5 Finir le minimum\n5/5 Vérifier'}[id]||'Commence par une toute petite action.'}
function setTimerText(){const m=Math.floor(timerRemaining/60),s=timerRemaining%60;$('timer-display').textContent=m+':'+String(s).padStart(2,'0')}$('timer-btn').onclick=()=>{if(timerRemaining<=0)return;timerRunning=!timerRunning;if(timerRunning){$('timer-btn').textContent='⏸ Pause';timerInterval=setInterval(()=>{timerRemaining--;setTimerText();if(timerRemaining<=0){clearInterval(timerInterval);clearInterval(timerGuideInterval);timerRunning=false;$('timer-btn').style.display='none';$('timer-done').style.display='block';alert('Pause terminée, tu peux continuer')}},1000)}else{$('timer-btn').textContent='▶ Continuer';clearInterval(timerInterval)}};$('timer-reset').onclick=()=>{clearInterval(timerInterval);clearInterval(timerGuideInterval);timerRemaining=300;timerRunning=false;setTimerText();$('timer-btn').textContent='▶ Start';$('timer-btn').style.display='inline-block';$('timer-done').style.display='none'};$('reset-all').onclick=()=>{selectedFeels=[];document.querySelectorAll('.feel').forEach(b=>b.classList.remove('selected'));$('task-input').value='';updateNext();show('task')};
function setupVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition,b=$('voice-btn');if(!SR){b.disabled=true;$('voice-status').textContent='Dictée non disponible sur ce navigateur.';return}recognition=new SR();recognition.lang='fr-FR';recognition.interimResults=true;recognition.onstart=()=>{isListening=true;b.classList.add('listening');b.textContent='Arrêter';$('voice-status').textContent="J’écoute en français..."};recognition.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;$('task-input').value=(voiceBaseText+(voiceBaseText&&t?' ':'')+t).trimStart();updateNext()};recognition.onend=()=>{isListening=false;b.classList.remove('listening');b.textContent='Dictée'};b.onclick=()=>{if(isListening)return recognition.stop();voiceBaseText=$('task-input').value.trim();recognition.lang='fr-FR';recognition.start()}}setupVoice();
</script>
</body>
</html>
